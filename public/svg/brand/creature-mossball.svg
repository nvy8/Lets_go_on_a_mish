<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="mossballTitle">
  <title id="mossballTitle">Mossball, a fluffy moss creature with twig arms</title>
  <ellipse cx="100" cy="184" rx="56" ry="6" fill="#2d2d2d" opacity="0.12"/>
  <!-- twig arms -->
  <path d="M44 116 L20 100 M20 100 L14 92 M20 100 L12 106" stroke="#a8551f" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M156 116 L180 100 M180 100 L186 92 M180 100 L188 106" stroke="#a8551f" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- moss ball (bumpy circle) -->
  <path d="M40 110 C40 78 64 56 100 56 C136 56 160 78 160 110 C160 144 138 174 100 174 C62 174 40 144 40 110 Z"
        fill="#7fb3a3" stroke="#2d2d2d" stroke-width="3.5"/>
  <!-- moss tufts on top -->
  <path d="M60 64 Q66 50 74 60 Q82 50 90 60 Q100 48 110 60 Q120 50 128 60 Q138 50 144 64"
        fill="none" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
  <!-- texture spots -->
  <circle cx="60" cy="120" r="5" fill="#5a8a7a"/>
  <circle cx="140" cy="100" r="6" fill="#5a8a7a"/>
  <circle cx="120" cy="150" r="5" fill="#5a8a7a"/>
  <circle cx="80" cy="148" r="4" fill="#5a8a7a"/>
  <circle cx="76" cy="92" r="4" fill="#5a8a7a"/>
  <!-- tiny flower -->
  <circle cx="130" cy="74" r="3" fill="#f7b100" stroke="#2d2d2d" stroke-width="1.5"/>
  <!-- eyes -->
  <circle cx="84" cy="112" r="12" fill="#ffffff" stroke="#2d2d2d" stroke-width="3"/>
  <circle cx="116" cy="112" r="12" fill="#ffffff" stroke="#2d2d2d" stroke-width="3"/>
  <circle cx="87" cy="115" r="5" fill="#2d2d2d"/>
  <circle cx="119" cy="115" r="5" fill="#2d2d2d"/>
  <!-- smile -->
  <path d="M88 134 Q100 144 112 134" fill="none" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round"/>
</svg>
