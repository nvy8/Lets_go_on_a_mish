<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="readTitle">
  <title id="readTitle">Sleuth reading a clue book</title>
  <ellipse cx="100" cy="184" rx="48" ry="5" fill="#2d2d2d" opacity="0.12"/>
  <!-- body -->
  <path d="M56 178 C56 138 70 116 100 116 C130 116 144 138 144 178 Z" fill="#a8551f" stroke="#2d2d2d" stroke-width="3.5"/>
  <path d="M100 116 C130 116 144 138 144 178 L124 178 C124 144 116 122 100 118 Z" fill="#7d3f17" opacity="0.55"/>
  <!-- head -->
  <circle cx="100" cy="80" r="36" fill="#fce3c4" stroke="#2d2d2d" stroke-width="3.5"/>
  <!-- hair -->
  <path d="M66 66 C72 48 92 42 110 48 C124 52 128 62 126 74 C114 62 92 58 76 68 Z" fill="#3a2818" stroke="#2d2d2d" stroke-width="3"/>
  <!-- eyes looking down at book -->
  <path d="M82 88 Q88 94 94 88" fill="none" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
  <path d="M106 88 Q112 94 118 88" fill="none" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
  <!-- mouth -->
  <path d="M92 104 Q100 108 108 104" fill="none" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
  <!-- book held in front -->
  <path d="M50 140 L100 150 L150 140 L150 172 L100 182 L50 172 Z" fill="#fdfbf7" stroke="#2d2d2d" stroke-width="3.5" stroke-linejoin="round"/>
  <path d="M100 150 L100 182" stroke="#2d2d2d" stroke-width="3"/>
  <!-- book lines -->
  <path d="M60 156 L92 162 M60 164 L92 170 M108 162 L140 156 M108 170 L140 164" stroke="#2d2d2d" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
  <!-- arms holding book -->
  <path d="M70 130 L56 144" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M130 130 L144 144" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round"/>
  <!-- sparkle (curious) -->
  <path d="M170 60 L174 70 L184 74 L174 78 L170 88 L166 78 L156 74 L166 70 Z" fill="#f7b100" stroke="#2d2d2d" stroke-width="2" stroke-linejoin="round"/>
</svg>
