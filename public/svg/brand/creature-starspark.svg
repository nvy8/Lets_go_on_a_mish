<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="starsparkTitle">
  <title id="starsparkTitle">Starspark, a cheerful star spirit with arms</title>
  <ellipse cx="100" cy="186" rx="40" ry="5" fill="#2d2d2d" opacity="0.12"/>
  <!-- arms -->
  <path d="M48 122 L20 110" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round" fill="none"/>
  <path d="M152 122 L180 110" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round" fill="none"/>
  <circle cx="18" cy="110" r="9" fill="#fce3c4" stroke="#2d2d2d" stroke-width="3"/>
  <circle cx="182" cy="110" r="9" fill="#fce3c4" stroke="#2d2d2d" stroke-width="3"/>
  <!-- star body -->
  <path d="M100 30 L120 88 L182 88 L132 124 L150 182 L100 146 L50 182 L68 124 L18 88 L80 88 Z"
        fill="#f7b100" stroke="#2d2d2d" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- inner shadow -->
  <path d="M100 50 L116 92 L100 100 L84 92 Z" fill="#c98c00" opacity="0.5"/>
  <!-- legs (little stubs) -->
  <rect x="84" y="150" width="10" height="22" rx="4" fill="#a8551f" stroke="#2d2d2d" stroke-width="3"/>
  <rect x="106" y="150" width="10" height="22" rx="4" fill="#a8551f" stroke="#2d2d2d" stroke-width="3"/>
  <!-- eyes -->
  <circle cx="84" cy="108" r="11" fill="#ffffff" stroke="#2d2d2d" stroke-width="3"/>
  <circle cx="116" cy="108" r="11" fill="#ffffff" stroke="#2d2d2d" stroke-width="3"/>
  <circle cx="87" cy="111" r="5" fill="#2d2d2d"/>
  <circle cx="119" cy="111" r="5" fill="#2d2d2d"/>
  <!-- smile -->
  <path d="M88 126 Q100 136 112 126" fill="none" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round"/>
  <!-- cheeks -->
  <circle cx="74" cy="124" r="4" fill="#ff8aa1" opacity="0.6"/>
  <circle cx="126" cy="124" r="4" fill="#ff8aa1" opacity="0.6"/>
</svg>
