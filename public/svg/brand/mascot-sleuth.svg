<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="sleuthTitle">
  <title id="sleuthTitle">Friendly Mish with magnifying glass</title>
  <!-- shadow under feet -->
  <ellipse cx="100" cy="182" rx="46" ry="6" fill="#2d2d2d" opacity="0.12"/>
  <!-- body / coat -->
  <path d="M58 178 C58 132 70 110 100 110 C130 110 142 132 142 178 Z" fill="#c9956b" stroke="#2d2d2d" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- coat shadow -->
  <path d="M100 110 C130 110 142 132 142 178 L122 178 C122 140 115 118 100 112 Z" fill="#a87a52" opacity="0.55"/>
  <!-- collar -->
  <path d="M82 116 L100 132 L118 116 L110 110 L100 116 L90 110 Z" fill="#fdfbf7" stroke="#2d2d2d" stroke-width="3" stroke-linejoin="round"/>
  <!-- head -->
  <circle cx="100" cy="80" r="38" fill="#fce3c4" stroke="#2d2d2d" stroke-width="3.5"/>
  <!-- hair tuft -->
  <path d="M70 62 C76 46 96 38 116 46 C126 50 130 60 128 70 C118 60 96 56 80 64 Z" fill="#5a3a22" stroke="#2d2d2d" stroke-width="3" stroke-linejoin="round"/>
  <!-- detective hat -->
  <path d="M58 60 Q100 30 142 60 L138 70 Q100 50 62 70 Z" fill="#a8551f" stroke="#2d2d2d" stroke-width="3.5" stroke-linejoin="round"/>
  <ellipse cx="100" cy="68" rx="48" ry="6" fill="#7d3f17" stroke="#2d2d2d" stroke-width="3"/>
  <!-- eyes (big, expressive) -->
  <circle cx="86" cy="86" r="8" fill="#ffffff" stroke="#2d2d2d" stroke-width="2.5"/>
  <circle cx="114" cy="86" r="8" fill="#ffffff" stroke="#2d2d2d" stroke-width="2.5"/>
  <circle cx="88" cy="88" r="3.5" fill="#2d2d2d"/>
  <circle cx="116" cy="88" r="3.5" fill="#2d2d2d"/>
  <!-- smile -->
  <path d="M88 102 Q100 110 112 102" fill="none" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
  <!-- cheeks -->
  <circle cx="78" cy="98" r="4" fill="#ff8aa1" opacity="0.55"/>
  <circle cx="122" cy="98" r="4" fill="#ff8aa1" opacity="0.55"/>
  <!-- arm + magnifier -->
  <path d="M138 132 L162 122" fill="none" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round"/>
  <circle cx="170" cy="110" r="18" fill="#eaf1fb" stroke="#2d2d2d" stroke-width="4" opacity="0.85"/>
  <path d="M184 124 L196 138" stroke="#2d2d2d" stroke-width="6" stroke-linecap="round"/>
  <!-- magnifier glint -->
  <path d="M162 100 Q166 100 168 104" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
</svg>
