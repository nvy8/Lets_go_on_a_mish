<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="gembuddyTitle">
  <title id="gembuddyTitle">Gembuddy, a faceted gem with friendly eyes</title>
  <ellipse cx="100" cy="186" rx="44" ry="5" fill="#2d2d2d" opacity="0.12"/>
  <!-- gem outline (hexagonal-ish) -->
  <path d="M100 30 L160 70 L150 158 L100 178 L50 158 L40 70 Z"
        fill="#d3d7ec" stroke="#2d2d2d" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- facets -->
  <path d="M100 30 L100 178" stroke="#2d2d2d" stroke-width="2.5" opacity="0.45"/>
  <path d="M40 70 L100 100 L160 70" fill="none" stroke="#2d2d2d" stroke-width="2.5" opacity="0.45"/>
  <path d="M50 158 L100 100 L150 158" fill="none" stroke="#2d2d2d" stroke-width="2.5" opacity="0.45"/>
  <!-- facet shading -->
  <path d="M100 30 L160 70 L100 100 Z" fill="#a8acc4" opacity="0.55"/>
  <path d="M100 100 L150 158 L100 178 Z" fill="#a8acc4" opacity="0.55"/>
  <!-- highlight -->
  <path d="M60 60 L80 56 L74 76 Z" fill="#ffffff" opacity="0.6"/>
  <!-- eyes -->
  <circle cx="82" cy="118" r="11" fill="#ffffff" stroke="#2d2d2d" stroke-width="3"/>
  <circle cx="118" cy="118" r="11" fill="#ffffff" stroke="#2d2d2d" stroke-width="3"/>
  <circle cx="85" cy="121" r="5" fill="#2d2d2d"/>
  <circle cx="121" cy="121" r="5" fill="#2d2d2d"/>
  <circle cx="87" cy="119" r="1.6" fill="#ffffff"/>
  <circle cx="123" cy="119" r="1.6" fill="#ffffff"/>
  <!-- smile -->
  <path d="M86 140 Q100 152 114 140" fill="none" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round"/>
  <!-- sparkle -->
  <path d="M148 40 L152 50 L162 54 L152 58 L148 68 L144 58 L134 54 L144 50 Z" fill="#f7b100" stroke="#2d2d2d" stroke-width="2"/>
</svg>
