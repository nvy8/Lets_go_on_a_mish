<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="puzzledTitle">
  <title id="puzzledTitle">Mish looking puzzled</title>
  <ellipse cx="100" cy="184" rx="40" ry="5" fill="#2d2d2d" opacity="0.12"/>
  <!-- body -->
  <path d="M64 178 C64 138 76 118 100 118 C124 118 136 138 136 178 Z" fill="#d3d7ec" stroke="#2d2d2d" stroke-width="3.5"/>
  <path d="M100 118 C124 118 136 138 136 178 L118 178 C118 146 112 124 100 120 Z" fill="#a8acc4" opacity="0.55"/>
  <!-- head -->
  <circle cx="100" cy="84" r="40" fill="#fce3c4" stroke="#2d2d2d" stroke-width="3.5"/>
  <!-- hair (tousled) -->
  <path d="M64 72 C70 52 92 44 112 50 C124 54 132 64 130 78 C118 64 94 60 76 70 Z" fill="#5a3a22" stroke="#2d2d2d" stroke-width="3"/>
  <path d="M124 56 L134 48 M70 56 L62 50" stroke="#2d2d2d" stroke-width="2.5" stroke-linecap="round"/>
  <!-- eyes looking sideways -->
  <circle cx="86" cy="88" r="9" fill="#ffffff" stroke="#2d2d2d" stroke-width="2.5"/>
  <circle cx="114" cy="88" r="9" fill="#ffffff" stroke="#2d2d2d" stroke-width="2.5"/>
  <circle cx="90" cy="90" r="3.5" fill="#2d2d2d"/>
  <circle cx="118" cy="90" r="3.5" fill="#2d2d2d"/>
  <!-- eyebrows asymmetric -->
  <path d="M76 74 L96 70" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
  <path d="M104 70 Q114 76 122 72" fill="none" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
  <!-- wavy mouth -->
  <path d="M86 108 Q92 102 98 108 Q104 114 110 108 Q116 102 116 108" fill="none" stroke="#2d2d2d" stroke-width="3" stroke-linecap="round"/>
  <!-- question marks -->
  <text x="150" y="58" font-family="Georgia, serif" font-size="34" font-weight="700" fill="#ff4d4d" stroke="#2d2d2d" stroke-width="1.5" transform="rotate(15 150 58)">?</text>
  <text x="36" y="76" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#f7b100" stroke="#2d2d2d" stroke-width="1.2" transform="rotate(-18 36 76)">?</text>
</svg>
