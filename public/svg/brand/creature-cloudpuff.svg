<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="cloudpuffTitle">
  <title id="cloudpuffTitle">Cloudpuff, a smiling cloud sprite</title>
  <ellipse cx="100" cy="184" rx="58" ry="5" fill="#2d2d2d" opacity="0.10"/>
  <!-- cloud body (bumpy outline) -->
  <path d="M40 130 C26 130 24 110 38 104 C30 86 50 70 68 80 C76 60 108 58 118 78 C140 70 162 90 154 110 C172 114 172 138 154 142 C148 162 60 162 46 142 C30 142 28 132 40 130 Z"
        fill="#eef0fa" stroke="#2d2d2d" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- subtle shadow -->
  <path d="M52 148 C70 158 130 158 150 146 C140 162 64 162 52 148 Z" fill="#d3d7ec" opacity="0.7"/>
  <!-- eyes (closed happy crescents) -->
  <path d="M76 112 Q86 100 96 112" fill="none" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <path d="M104 112 Q114 100 124 112" fill="none" stroke="#2d2d2d" stroke-width="4" stroke-linecap="round"/>
  <!-- tiny smile -->
  <path d="M90 128 Q100 136 110 128" fill="none" stroke="#2d2d2d" stroke-width="3.5" stroke-linecap="round"/>
  <!-- cheeks -->
  <circle cx="72" cy="126" r="5" fill="#ff8aa1" opacity="0.55"/>
  <circle cx="128" cy="126" r="5" fill="#ff8aa1" opacity="0.55"/>
  <!-- raindrop friends -->
  <path d="M30 80 C28 86 30 92 36 92 C42 92 44 86 42 80 L36 70 Z" fill="#7fb3a3" stroke="#2d2d2d" stroke-width="2.5"/>
  <path d="M168 76 C166 82 168 88 174 88 C180 88 182 82 180 76 L174 66 Z" fill="#f7b100" stroke="#2d2d2d" stroke-width="2.5"/>
</svg>
